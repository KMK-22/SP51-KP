<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog ESP & Arduino - Krzysztof Pawłowski</title>
    <style>
        :root {
            --arduino-color: #00979d;
            --esp-color: #e7352c;
            --dark: #2c3e50;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* LOBBY */
        #lobby { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #2c3e50 0%, #000 100%); 
            color: white; 
            padding: 20px;
            position: relative;
        }
        
        .cards-container { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; margin-bottom: 60px; }
        
        .card {
            width: 320px; padding: 30px; border-radius: 20px; cursor: pointer;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; text-align: center;
        }
        .card:hover { transform: scale(1.05); background: rgba(255,255,255,0.2); }
        .card.arduino h2 { color: #00ca91; }
        .card.esp h2 { color: #ff5e57; }

        /* PASEK AUTORA */
        .author-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .author-bar b { color: white; }

        /* CONTENT */
        #content { display: none; padding: 40px; max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn-back { padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; background: var(--dark); color: white; font-weight: bold; }

        .section-title { 
            font-size: 1.5rem; margin: 40px 0 20px; padding-bottom: 10px; 
            border-bottom: 3px solid #ddd; color: var(--dark); display: flex; align-items: center;
        }
        .section-title span { margin-right: 15px; font-size: 1.8rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 15px;
        }
        .item:hover { transform: translateX(5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .item h3 { margin: 0; font-size: 1rem; flex-grow: 1; }

        /* MODAL */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal {
            background: white; width: 90%; max-width: 500px; padding: 40px; border-radius: 25px;
            position: relative; text-align: center; border-top: 10px solid var(--dark);
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #999; }
        #m-cat { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #888; font-weight: bold; }
    </style>
</head>
<body>

<div id="lobby">
    <h1>Warsztat Elektronika</h1>
    <p>Wybierz bazę komponentów pod swoje zastosowanie</p>
    
    <div class="cards-container">
        <div class="card arduino" onclick="initView('arduino')">
            <h2>ARDUINO</h2>
            <p>Nauka, Prototypy, Robotyka</p>
        </div>
        <div class="card esp" onclick="initView('esp')">
            <h2>ESP32 / 8266</h2>
            <p>Smart Home, IoT, Serwery WWW</p>
        </div>
    </div>

    <div class="author-bar">
        Zrobione przez <b>Krzysztof Pawłowski</b>
    </div>
</div>

<div id="content">
    <div class="header">
        <h1 id="main-title">Katalog</h1>
        <button class="btn-back" onclick="location.reload()">← Zmień Platformę</button>
    </div>
    <div id="sections-container"></div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal" id="modal-box" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="m-cat">Kategoria</div>
        <h2 id="m-title">Nazwa części</h2>
        <p id="m-desc">Opis...</p>
    </div>
</div>

            { cat: "Pomiary i Otoczenie", icon: "🌡️", name: "Czujnik PIR", desc: "Wykrywa ruch ludzi. Podstawa systemów alarmowych." },

            { cat: "Zaawansowane Sensory", icon: "🚀", name: "Czujnik tętna MAX30102", desc: "Mierzy puls i natlenienie krwi bezpośrednio z palca." },
            { cat: "Zaawansowane Sensory", icon: "🚀", name: "ADS1115 ADC", desc: "Zwiększa dokładność odczytów analogowych dla ESP32." },
            { cat: "Zaawansowane Sensory", icon: "🚀", name: "MCP23017 Ekspander", desc: "Dodaje 16 nowych pinów, jeśli zabraknie miejsca na kable." },
            { cat: "Zaawansowane Sensory", icon: "🚀", name: "Czujnik BH1750", desc: "Cyfrowy pomiar natężenia światła w luksach (bardzo precyzyjny)." },
            { cat: "Zaawansowane Sensory", icon: "🚀", name: "Włącznik TTP223", desc: "Dotykowy przycisk, który działa nawet przez plastikową obudowę." }

    };

    function initView(platform) {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        const color = platform === 'arduino' ? 'var(--arduino-color)' : 'var(--esp-color)';
        document.getElementById('main-title').innerText = platform.toUpperCase() + " / Zastosowania";
        document.getElementById('main-title').style.color = color;

        const container = document.getElementById('sections-container');
        container.innerHTML = '';

        const sections = {};
        db[platform].forEach(item => {
            if (!sections[item.cat]) sections[item.cat] = { icon: item.icon, items: [] };
            sections[item.cat].items.push(item);
        });

        for (const [name, data] of Object.entries(sections)) {
            const sectionHtml = `
                <div class="section-title"><span>${data.icon}</span> ${name}</div>
                <div class="grid">
                    ${data.items.map(i => `
                        <div class="item" onclick="openModal('${i.name}', '${i.desc}', '${i.cat}', '${color}')">
                            <div class="dot" style="background:${color}"></div>
                            <h3>${i.name}</h3>
                        </div>
                    `).join('')}
                </div>
            `;
            container.insertAdjacentHTML('beforeend', sectionHtml);
        }
    }

    function openModal(title, desc, cat, color) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-desc').innerText = desc;
        document.getElementById('m-cat').innerText = cat;
        document.getElementById('modal-box').style.borderTopColor = color;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }
</script>

</body>
</html>
